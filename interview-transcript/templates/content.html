<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
    <a id="start"></a>
    <h1>{{ title }}</h1>
    <p class="meta">{{ author }}{% if source_url %} | <a href="{{ source_url }}">Source</a>{% endif %}</p>
    <p class="meta">{{ date }}</p>
    <mbp:pagebreak />

    {% for section in sections %}
    <div id="section_{{ loop.index }}">
        {% if section.title %}
        <h2>{{ section.title }}</h2>
        {% endif %}
        {{ section.content }}
        <mbp:pagebreak />
    </div>
    {% endfor %}
</body>
</html>
